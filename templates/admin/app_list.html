{% load i18n %}{% spaceless %}
{% if app_list %}
  {% for app in app_list %}
    <div class="app-{{ app.app_label }} module" style="margin: 0; padding: 0; border: none;">
      <table style="margin: 0; padding: 0; border: none; width: 100%; border-collapse: collapse;">
        <caption style="margin: 0; padding: 4px 16px; border: none; background: #003459; color: white; text-align: left; font-weight: bold; font-size: 11px; text-transform: uppercase;">
          <span>{{ app.name }}</span>
        </caption>
        {% for model in app.models %}
          <tr class="model-{{ model.object_name|lower }}" style="margin: 0; padding: 0; border: none;">
            <th scope="row" style="margin: 0; padding: 0; border: none;">
              {% if model.admin_url %}
                <a href="{{ model.admin_url }}" {% if model.is_active %}class="active"{% endif %} style="display: block; padding: 2px 16px; margin: 0; border: none; font-size: 13px; color: #003459; text-decoration: none;">{{ model.name }}</a>
              {% else %}
                <span style="display: block; padding: 2px 16px; margin: 0; border: none; font-size: 13px;">{{ model.name }}</span>
              {% endif %}
            </th>
          </tr>
        {% endfor %}
      </table>
    </div>
  {% endfor %}
{% endif %}
{% endspaceless %}
